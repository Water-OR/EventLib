name: Build with Gradle

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - legacy/**

permissions:
  contents: read

jobs:
  build:
    name: Build

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Chmod Gradle
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload Test Failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-report
          path: ./lib/build/reports/tests/test/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts
          path: ./lib/build/libs/